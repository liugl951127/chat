name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  static-check:
    name: Static Check (Java + Vue + YAML)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 17 }

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}

      - name: Static check (Java)
        run: bash scripts/static-check.sh

      - name: Static check (Vue)
        run: cd fin-web && bash scripts/vue-check.sh

      - name: Business logic smoke (Node)
        run: node scripts/sim-server.js

  build-backend:
    name: Maven Build
    runs-on: ubuntu-latest
    needs: static-check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 17 }
      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
      - name: Build (skip tests)
        run: mvn -B clean install -DskipTests -Dmaven.javadoc.skip=true
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-jars
          path: |
            fin-*/target/*.jar
            !fin-*/target/*-sources.jar
            !fin-*/target/*-javadoc.jar

  build-frontend:
    name: Vue Build
    runs-on: ubuntu-latest
    needs: static-check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm, cache-dependency-path: fin-web/package-lock.json }
      - name: Install & Build
        working-directory: fin-web
        run: |
          npm ci || npm install
          npm run build
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: fin-web/dist
