version: '3.8'

services:
  # ========== 基础设施 ==========
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: fin_chat
    ports: ["3306:3306"]
    volumes:
      - ./mysql-init:/docker-entrypoint-initdb.d
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    volumes: [redis_data:/data]

  nacos:
    image: nacos/nacos-server:v2.3.2
    environment: { MODE: standalone, JVM_XMS: 256m, JVM_XMX: 256m }
    ports: ["8848:8848", "9848:9848"]

  # ========== 第一批: 基础业务 ==========
  kms-gateway:
    build: ../fin-kms-gateway
    ports: ["8091:8091"]
    environment:
      KMS_SOFT: "true"
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/fin_kms
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root123

  notify-center:
    build: ../fin-notify-center
    ports: ["8092:8092"]
    depends_on: [mysql, redis]

  audit-center:
    build: ../fin-audit-center
    ports: ["8093:8093"]
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/fin_audit
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root123
    depends_on: [mysql]

  # ========== 第二批: 核心业务 ==========
  auth-center:
    build: ../fin-auth-center
    ports: ["8081:8081"]
    environment:
      REDIS_HOST: redis
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/fin_auth
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root123
      WX_MINI_APPID: ${WX_MINI_APPID:-wx_demo}
      WX_MINI_SECRET: ${WX_MINI_SECRET:-secret_demo}
      WECOM_CORPID: ${WECOM_CORPID:-ww_demo}
      WECOM_CORPSECRET: ${WECOM_CORPSECRET:-secret_demo}
      KMS_URL: http://kms-gateway:8091
    depends_on: [mysql, redis, kms-gateway]

  chat-center:
    build: ../fin-chat-center
    ports: ["8082:8082"]
    environment:
      REDIS_HOST: redis
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/fin_chat
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root123
    depends_on: [mysql, redis]

  trade-gateway:
    build: ../fin-trade-gateway
    ports: ["8083:8083"]
    environment:
      REDIS_HOST: redis
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/fin_trade
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root123
    depends_on: [mysql, redis, kms-gateway]

  compliance-center:
    build: ../fin-compliance-center
    ports: ["8090:8090"]
    environment:
      REDIS_HOST: redis
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/fin_compliance
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root123
    depends_on: [mysql, redis]

  observability:
    build: ../fin-observability
    ports: ["8094:8094"]
    depends_on:
      - auth-center
      - chat-center
      - trade-gateway
      - kms-gateway
      - notify-center
      - audit-center
      - compliance-center

  # ========== 第三批: 网关 + 前端 ==========
  gateway:
    build: ../fin-gateway
    ports: ["9000:9000"]
    depends_on:
      - auth-center
      - chat-center
      - trade-gateway
      - kms-gateway
      - notify-center
      - audit-center
      - compliance-center

  web:
    build: ../fin-web
    ports: ["8088:80"]

  nginx:
    image: nginx:1.25-alpine
    ports: ["3000:80"]
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on: [gateway, web]

volumes:
  mysql_data:
  redis_data:
