# ============================================================
# 生产 profile - fin-auth-center
# ============================================================
server:
  port: 8081
  servlet:
    context-path: /
  tomcat:
    accept-count: 200
    max-connections: 2000
    threads:
      max: 400
      min-spare: 50

spring:
  application:
    name: fin-auth-center
  profiles:
    active: prod
  # MySQL 8 生产配置
  datasource:
    url: jdbc:mysql://${DB_HOST:mysql}:${DB_PORT:3306}/${DB_NAME:fin_auth}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=true&requireSSL=true&verifyServerCertificate=true
    username: ${DB_USER}
    password: ${DB_PASS}
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
      connection-timeout: 10000
      idle-timeout: 300000
      max-lifetime: 1800000
      connection-test-query: SELECT 1
  # Redis 6+ 集群
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASS:}
      timeout: 3s
      lettuce:
        pool:
          max-active: 100
          max-idle: 50
          min-idle: 10

# MyBatis-Plus
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
    default-fetch-size: 500
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# ============== FinChat 业务配置 (生产) ==============
fin:
  jwt:
    issuer: fin-auth
    access-ttl-seconds: 900                # 15 min
    refresh-ttl-seconds: 1209600           # 14 days
    signing-key-alias: jwt-signing-prod    # 生产 key alias

  # 微信小程序
  wx:
    mini:
      appid: ${WX_MINI_APPID}
      secret: ${WX_MINI_SECRET}
    # 微信公众号
    h5:
      appid: ${WX_H5_APPID}
      secret: ${WX_H5_SECRET}

  # 企业微信
  wecom:
    corpid: ${WECOM_CORPID}
    corpsecret: ${WECOM_CORPSECRET}
    agentid: ${WECOM_AGENTID:1000001}
    # 通讯录免登 secret (可选)
    contact-secret: ${WECOM_CONTACT_SECRET:}

  # 短信
  sms:
    ttl-seconds: 60
    max-retry: 5
    cool-down: 60

  # 加密机 (生产接硬件)
  kms:
    url: ${KMS_URL:http://kms-gateway:8091}
    soft-fallback: ${KMS_SOFT:false}      # 生产必须 false
    key-alias-prefix: prod

  # 审计
  audit:
    endpoint: ${AUDIT_URL:http://audit-center:8093}

  # 登录风控
  login:
    max-per-minute: 30
    max-per-device-per-day: 50

# ============== 日志 ==============
logging:
  level:
    root: INFO
    com.fin: INFO
    com.fin.auth: INFO
    org.springframework.security: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%X{traceId:-}] %logger{36} - %msg%n"
  file:
    name: /var/log/fin-chat/auth-center.log
    max-size: 100MB
    max-history: 30

# ============== Actuator ==============
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  metrics:
    tags:
      application: fin-auth-center
