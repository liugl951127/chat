server:
  port: 9000

spring:
  application:
    name: fin-gateway
  main:
    web-application-type: reactive   # Gateway 用 WebFlux, 不能用 servlet
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        - id: auth
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/auth/**
        - id: chat
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/chat/**
        - id: trade
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/trade/**
        - id: compliance
          uri: http://localhost:8090
          predicates:
            - Path=/api/v1/compliance/**
        - id: kms
          uri: http://localhost:8091
          predicates:
            - Path=/api/kms/**
        - id: notify
          uri: http://localhost:8092
          predicates:
            - Path=/api/v1/notify/**
        - id: audit
          uri: http://localhost:8093
          predicates:
            - Path=/api/v1/audit/**
        - id: observability
          uri: http://localhost:8094
          predicates:
            - Path=/api/v1/observability/**

fin:
  jwt:
    enabled: true
    whitelist:
      - /api/v1/auth/login
      - /api/v1/auth/wx/**
      - /api/v1/auth/sms/**
      - /api/v1/auth/refresh
      - /api/kms/**

logging:
  level:
    com.fin: DEBUG
    org.springframework.cloud.gateway: INFO
