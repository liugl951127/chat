server:
  port: 8091

spring:
  application:
    name: fin-kms-gateway
  profiles:
    active: dev

fin:
  kms:
    host: ${KMS_HOST:127.0.0.1}
    port: ${KMS_PORT:8000}
    app-id: fin-app-001
    app-key: ${KMS_APP_KEY:demo-key-do-not-use-in-prod}
    pool-size: 8
    timeout-ms: 3000
    soft-fallback:
      enabled: ${KMS_SOFT:true}  # 沙箱默认开, 生产必须 false

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:h2:mem:fin_kms
    driver-class-name: org.h2.Driver
    username: sa
    password:

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:mysql://mysql:3306/fin_kms?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${DB_USER}
    password: ${DB_PASS}
