<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Fin-Chat H5 手机端</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0;
      font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #f0f2f5;
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      position: relative;
    }

    /* 顶部状态栏 */
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 14px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header h1 { font-size: 16px; margin: 0; font-weight: 600; }
    .header .status {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 10px;
      background: rgba(255,255,255,0.2);
    }
    .header .status.online { background: #00b894; }

    /* 会话列表 */
    .conv-list {
      padding: 12px;
    }
    .conv-card {
      background: white;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }
    .avatar {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: bold;
      flex-shrink: 0;
    }
    .conv-info { flex: 1; min-width: 0; }
    .conv-info .title {
      font-size: 15px; font-weight: 600;
      display: flex; justify-content: space-between; align-items: center;
    }
    .conv-info .meta {
      font-size: 12px; color: #909399; margin-top: 4px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .badge {
      background: #ff4757;
      color: white;
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 8px;
    }

    /* 聊天 */
    .chat-screen { display: none; }
    .chat-header {
      background: white;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid #ebeef5;
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .back-btn {
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      cursor: pointer;
    }
    .chat-title { flex: 1; font-size: 15px; font-weight: 600; }

    .messages {
      padding: 12px;
      padding-bottom: 80px;
      overflow-y: auto;
    }
    .msg {
      display: flex;
      margin-bottom: 14px;
      align-items: flex-start;
    }
    .msg.mine { flex-direction: row-reverse; }
    .msg .avatar { width: 32px; height: 32px; font-size: 12px; }
    .bubble {
      max-width: 75%;
      margin: 0 8px;
      padding: 10px 12px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.04);
      font-size: 14px;
      line-height: 1.5;
      word-break: break-word;
    }
    .msg.mine .bubble {
      background: #667eea;
      color: white;
    }
    .msg-time {
      text-align: center;
      font-size: 11px;
      color: #909399;
      margin: 8px 0;
    }

    /* 产品卡片 */
    .product-card {
      background: white;
      border-radius: 12px;
      padding: 14px;
      margin: 8px;
      max-width: 280px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      border: 1px solid #ebeef5;
    }
    .product-tag {
      display: inline-block;
      padding: 2px 8px;
      background: #e3f2fd;
      color: #1976d2;
      border-radius: 4px;
      font-size: 11px;
      margin-right: 6px;
    }
    .product-tag.wealth { background: #fff3e0; color: #e65100; }
    .product-tag.insurance { background: #fce4ec; color: #c2185b; }
    .product-name {
      font-size: 16px;
      font-weight: 600;
      margin: 6px 0;
    }
    .product-yield {
      color: #f56c6c;
      font-size: 22px;
      font-weight: 700;
      margin: 8px 0 4px;
    }
    .product-yield small { font-size: 12px; font-weight: normal; color: #909399; }
    .product-meta {
      font-size: 12px;
      color: #606266;
      line-height: 1.7;
    }
    .suitability-tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      margin-top: 6px;
    }
    .suitability-tag.PASS { background: #e8f5e9; color: #2e7d32; }
    .suitability-tag.WARN { background: #fff8e1; color: #f57f17; }
    .suitability-tag.BLOCK { background: #ffebee; color: #c62828; }
    .buy-btn {
      width: 100%;
      padding: 10px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      margin-top: 10px;
      cursor: pointer;
    }
    .buy-btn:disabled {
      background: #c0c4cc;
      cursor: not-allowed;
    }

    /* 订单卡片 */
    .order-card {
      background: white;
      border-radius: 12px;
      padding: 14px;
      margin: 8px;
      max-width: 280px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      border-left: 4px solid #667eea;
    }
    .order-status {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 600;
    }
    .order-status.PENDING_RISK_TEST { background: #fff3e0; color: #e65100; }
    .order-status.PENDING_DUAL_RECORD { background: #fce4ec; color: #c2185b; }
    .order-status.PENDING_CONFIRM { background: #e3f2fd; color: #1976d2; }
    .order-status.COOLING_OFF { background: #fff8e1; color: #f57f17; }
    .order-status.CONFIRMED { background: #e8f5e9; color: #2e7d32; }
    .order-status.SUCCESS { background: #c8e6c9; color: #1b5e20; }
    .order-status.REJECTED { background: #ffebee; color: #c62828; }
    .order-status.CANCELLED { background: #eeeeee; color: #616161; }
    .order-amount { font-size: 20px; color: #f56c6c; font-weight: 700; margin: 6px 0; }
    .order-next {
      font-size: 12px; color: #606266;
      background: #f5f7fa; padding: 8px; border-radius: 6px; margin-top: 8px;
    }
    .order-action {
      margin-top: 10px;
      display: flex; gap: 8px;
    }
    .order-action button {
      flex: 1;
      padding: 8px;
      border: 1px solid #667eea;
      background: white;
      color: #667eea;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
    }
    .order-action button.primary {
      background: #667eea;
      color: white;
    }

    /* 输入框 */
    .composer {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      max-width: 480px;
      margin: 0 auto;
      background: white;
      padding: 8px 12px;
      display: flex;
      gap: 8px;
      align-items: center;
      border-top: 1px solid #ebeef5;
      z-index: 50;
    }
    .composer input {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid #dcdfe6;
      border-radius: 20px;
      font-size: 14px;
      outline: none;
    }
    .composer button {
      padding: 8px 14px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 20px;
      font-size: 14px;
      cursor: pointer;
    }

    /* 购买弹窗 */
    .modal-mask {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      display: none;
      align-items: center; justify-content: center;
      z-index: 200;
    }
    .modal {
      background: white;
      border-radius: 12px;
      width: 90%;
      max-width: 400px;
      max-height: 80vh;
      overflow-y: auto;
    }
    .modal-header {
      padding: 16px;
      border-bottom: 1px solid #ebeef5;
      display: flex; justify-content: space-between; align-items: center;
    }
    .modal-body { padding: 16px; }
    .modal-footer {
      padding: 12px 16px;
      border-top: 1px solid #ebeef5;
      display: flex; gap: 10px;
    }
    .modal-footer button {
      flex: 1;
      padding: 10px;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
    }
    .modal-footer .secondary { background: white; border: 1px solid #dcdfe6; color: #606266; }
    .modal-footer .primary { background: #667eea; color: white; border: none; }

    .form-group { margin-bottom: 14px; }
    .form-group label { font-size: 13px; color: #606266; display: block; margin-bottom: 6px; }
    .form-group input, .form-group select {
      width: 100%;
      padding: 10px;
      border: 1px solid #dcdfe6;
      border-radius: 6px;
      font-size: 14px;
    }
    .warning-bar {
      background: #fff3e0;
      color: #e65100;
      padding: 10px;
      border-radius: 6px;
      font-size: 12px;
      margin: 10px 0;
    }

    /* 隐藏 */
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div id="loginMask" style="position:fixed;inset:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:300">
    <div style="background:white;padding:24px;border-radius:12px;width:340px;max-width:90%">
      <h2 style="margin:0 0 16px">📱 Fin-Chat H5 登录</h2>
      <div style="margin-bottom:12px">
        <label style="font-size:13px">用户 ID</label>
        <input id="loginUserId" value="1001" style="width:100%;padding:10px;border:1px solid #dcdfe6;border-radius:6px;margin-top:4px" />
      </div>
      <div style="margin-bottom:12px">
        <label style="font-size:13px">角色</label>
        <select id="loginRole" style="width:100%;padding:10px;border:1px solid #dcdfe6;border-radius:6px;margin-top:4px">
          <option value="1001">👤 普通客户</option>
          <option value="8001">👨‍💼 客服 (Agent)</option>
        </select>
      </div>
      <button onclick="doLogin()" style="width:100%;padding:12px;background:#667eea;color:white;border:none;border-radius:6px;font-size:14px;cursor:pointer">登录</button>
      <p style="font-size:11px;color:#909399;margin-top:12px;line-height:1.5">
        H5 演示模式:<br>
        • 客户 (1001): 聊天 + 看产品 + 购买<br>
        • 客服 (8001): 主动建会话 + 推产品<br>
        • 后端直连: 8082 (chat) / 8083 (trade)
      </p>
    </div>
  </div>

  <!-- 会话列表 -->
  <div id="convScreen">
    <div class="header">
      <h1>💬 消息</h1>
      <span id="status" class="status offline">离线</span>
    </div>
    <div id="convList" class="conv-list"></div>
  </div>

  <!-- 聊天界面 -->
  <div id="chatScreen" class="chat-screen">
    <div class="chat-header">
      <span class="back-btn" onclick="backToList()">‹</span>
      <span id="chatTitle" class="chat-title">会话</span>
      <span id="chatRole" style="font-size:11px;color:#909399"></span>
    </div>
    <div id="messages" class="messages"></div>
    <div class="composer">
      <input id="draft" placeholder="输入消息..." onkeydown="if(event.key==='Enter')sendMsg()" />
      <button onclick="sendMsg()">发送</button>
    </div>
  </div>

  <!-- 购买弹窗 -->
  <div id="buyModal" class="modal-mask">
    <div class="modal">
      <div class="modal-header">
        <h3 style="margin:0">购买理财</h3>
        <span style="cursor:pointer;font-size:20px" onclick="closeBuyModal()">×</span>
      </div>
      <div class="modal-body">
        <div id="buyProductInfo"></div>
        <div id="buySuitability"></div>
        <div class="form-group">
          <label>购买金额 (元)</label>
          <input id="buyAmount" type="number" placeholder="输入金额" />
        </div>
        <div id="buyWarning" class="warning-bar hidden"></div>
        <div style="font-size:11px;color:#909399;line-height:1.6">
          ⚠️ 合规提示:<br>
          • 本产品有 24 小时冷静期<br>
          • 冷静期内可全额取消<br>
          • 风险测评未完成请先测评
        </div>
      </div>
      <div class="modal-footer">
        <button class="secondary" onclick="closeBuyModal()">取消</button>
        <button class="primary" onclick="submitBuy()">立即下单</button>
      </div>
    </div>
  </div>

  <!-- 订单操作弹窗 -->
  <div id="orderModal" class="modal-mask">
    <div class="modal">
      <div class="modal-header">
        <h3 style="margin:0">订单详情</h3>
        <span style="cursor:pointer;font-size:20px" onclick="closeOrderModal()">×</span>
      </div>
      <div class="modal-body" id="orderModalBody"></div>
    </div>
  </div>

  <script>
    let userId, role, accessToken, ws, stompReady, currentConvId, conversations = []
    let currentBuyProduct = null

    const CHAT = 'http://localhost:8082'
    const TRADE = 'http://localhost:8083'
    const WS_URL = (loc => loc.protocol === 'https:' ? 'wss://localhost:8082/ws/chat' : 'ws://localhost:8082/ws/chat')(location)

    function doLogin() {
      userId = document.getElementById('loginUserId').value
      role = document.getElementById('loginRole').value
      // 根据角色覆盖 userId
      userId = role
      document.getElementById('loginMask').style.display = 'none'
      document.getElementById('chatRole').textContent = role.startsWith('8') ? '客服' : '客户'
      initWS()
      loadConvs()
    }

    function initWS() {
      ws = new WebSocket(WS_URL + '?userId=' + userId)
      ws.onopen = () => {
        setStatus(true)
        ws.send(['CONNECT', 'accept-version:1.2', 'host:localhost', 'X-User-Id:' + userId,
                 'heart-beat:10000,10000', '', '\x00'].join('\n'))
      }
      ws.onmessage = e => {
        const raw = e.data.toString()
        if (raw.startsWith('CONNECTED')) {
          setStatus(true)
        } else if (raw.startsWith('MESSAGE')) {
          const body = raw.split('\n\n')[1].replace(/\x00$/, '')
          try {
            const msg = JSON.parse(body)
            onMessage(msg)
          } catch (err) {}
        }
      }
      ws.onclose = () => setStatus(false)
      ws.onerror = () => setStatus(false)
    }

    function setStatus(on) {
      const el = document.getElementById('status')
      el.textContent = on ? '● 在线' : '● 离线'
      el.className = 'status ' + (on ? 'online' : 'offline')
    }

    function sendFrame(destination, body) {
      if (!ws || ws.readyState !== 1) { alert('未连接'); return }
      ws.send(['SEND', 'destination:' + destination, 'content-type:application/json',
               'X-User-Id:' + userId, '', JSON.stringify(body), '\x00'].join('\n'))
    }

    async function loadConvs() {
      const resp = await fetch(CHAT + '/api/v1/chat/conversations', { headers: { 'X-User-Id': userId }})
      const api = await resp.json()
      conversations = (api.data || []).filter(c => c && c.id)
      renderConvs()
    }

    function renderConvs() {
      const list = document.getElementById('convList')
      if (conversations.length === 0) {
        list.innerHTML = '<div style="text-align:center;color:#909399;padding:60px 20px;font-size:14px">' +
          (role.startsWith('8') ? '点击下方 "主动建会话" 给客户发起' : '暂无会话') + '</div>' +
          (role.startsWith('8') ? '<button onclick="agentNewConv()" style="display:block;margin:20px auto;padding:12px 24px;background:#667eea;color:white;border:none;border-radius:24px">+ 主动建会话</button>' : '')
        return
      }
      list.innerHTML = conversations.map(c => `
        <div class="conv-card" onclick="openConv('${c.id}')">
          <div class="avatar">${(c.title || '?')[0]}</div>
          <div class="conv-info">
            <div class="title">
              <span>${escapeHtml(c.title || '会话')}</span>
              <span style="font-size:11px;color:#909399">${c.msgCount || 0} 条</span>
            </div>
            <div class="meta">${c.lastMsgAt ? new Date(c.lastMsgAt).toLocaleString() : '点击开始聊天'}</div>
          </div>
        </div>
      `).join('')
    }

    async function agentNewConv() {
      const customerId = prompt('输入客户 ID:', '1001')
      if (!customerId) return
      const resp = await fetch(CHAT + '/api/v1/chat/agent/conversations', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-User-Id': userId },
        body: JSON.stringify({ customerId: Number(customerId), title: '理财顾问咨询' })
      })
      const api = await resp.json()
      if (api.data) {
        conversations.unshift(api.data)
        renderConvs()
        openConv(api.data.id)
      } else {
        alert('建会话失败: ' + api.message)
      }
    }

    async function openConv(convId) {
      currentConvId = convId
      document.getElementById('convScreen').classList.add('hidden')
      document.getElementById('chatScreen').style.display = 'block'
      const conv = conversations.find(c => c.id === convId)
      document.getElementById('chatTitle').textContent = conv?.title || '会话'

      // 订阅主题
      ws.send(['SUBSCRIBE', 'id:sub-' + convId, 'destination:/topic/chat/' + convId, '', '\x00'].join('\n'))

      // 加载历史
      const resp = await fetch(CHAT + '/api/v1/chat/messages/' + convId + '?size=50', {
        headers: { 'X-User-Id': userId }
      })
      const api = await resp.json()
      const msgs = (api.data?.records || api.data || []).slice().reverse()
      renderMessages(msgs)
    }

    function backToList() {
      currentConvId = null
      document.getElementById('convScreen').classList.remove('hidden')
      document.getElementById('chatScreen').style.display = 'none'
    }

    function sendMsg() {
      const draft = document.getElementById('draft')
      const content = draft.value.trim()
      if (!content || !currentConvId) return
      sendFrame('/app/chat/' + currentConvId, {
        conversationId: currentConvId,
        content,
        type: 'TEXT',
        senderType: role.startsWith('8') ? 'AGENT' : 'CUSTOMER'
      })
      draft.value = ''
    }

    function onMessage(msg) {
      if (msg.conversationId !== currentConvId) return
      const msgs = document.getElementById('messages')
      msgs.appendChild(renderMsg(msg))
      msgs.scrollTop = msgs.scrollHeight
    }

    function renderMessages(msgs) {
      const el = document.getElementById('messages')
      el.innerHTML = ''
      msgs.forEach(m => el.appendChild(renderMsg(m)))
      el.scrollTop = el.scrollHeight
    }

    function renderMsg(m) {
      const div = document.createElement('div')
      div.className = 'msg ' + (m.senderId == userId ? 'mine' : '')

      if (m.type === 'PRODUCT_CARD' && m.productPayload) {
        div.className = 'msg'
        const p = m.productPayload
        div.innerHTML = `
          <div class="avatar">理</div>
          <div>
            <div class="product-card">
              <span class="product-tag ${p.productType?.toLowerCase() || 'fund'}">${p.productType || 'FUND'}</span>
              <span class="suitability-tag ${p.suitability || 'PASS'}">${p.suitability || 'PASS'}</span>
              <div class="product-name">${escapeHtml(p.productName || '')}</div>
              <div class="product-yield">${p.expectedYield || '0.00'}<small> % 预期年化</small></div>
              <div class="product-meta">
                📅 期限: ${p.termDays || 0} 天<br>
                💵 起购: ${p.minAmount} 元<br>
                ⚖️ 风险: R${p.productRiskLevel?.substring(1) || 1}<br>
                🔒 冷静期: ${p.coolOffHours || 0} 小时
              </div>
              <button class="buy-btn" onclick='openBuyModal(${JSON.stringify(p).replace(/'/g, "&apos;")})'>
                立即购买
              </button>
            </div>
          </div>
        `
      } else if (m.type === 'ORDER' && m.orderPayload) {
        const o = m.orderPayload
        div.innerHTML = `
          <div class="avatar">📋</div>
          <div class="order-card" onclick='showOrderDetail("${m.orderId}")'>
            <span class="order-status ${o.status}">${o.status}</span>
            <div class="product-name" style="font-size:14px;margin:8px 0 4px">${escapeHtml(o.productName || '')}</div>
            <div class="order-amount">¥${o.amount}</div>
            <div class="order-next">${o.nextStep || ''}</div>
          </div>
        `
      } else {
        div.innerHTML = `
          <div class="avatar">${(m.senderType || '?')[0]}</div>
          <div>
            <div class="bubble">${escapeHtml(m.content || '')}</div>
            <div style="font-size:10px;color:#909399;margin-top:4px;text-align:center">${m.serverTs ? new Date(m.serverTs).toLocaleTimeString() : ''}</div>
          </div>
        `
      }
      return div
    }

    // ============== 购买流程 ==============
    function openBuyModal(p) {
      currentBuyProduct = p
      document.getElementById('buyProductInfo').innerHTML = `
        <div class="product-card" style="margin:0">
          <div class="product-name">${escapeHtml(p.productName)}</div>
          <div class="product-yield">${p.expectedYield}<small> % 预期年化</small></div>
          <div class="product-meta">
            起购: ${p.minAmount} 元<br>
            风险等级: R${p.productRiskLevel?.substring(1)}<br>
            最低投资者等级: C${p.minInvestorLevel?.substring(1)}<br>
            需要双录: ${p.requireDualRecord ? '是' : '否'}<br>
            冷静期: ${p.coolOffHours} 小时
          </div>
        </div>
      `
      document.getElementById('buySuitability').innerHTML = `
        <div class="suitability-tag ${p.suitability || 'PASS'}" style="display:block;padding:10px;margin:10px 0">
          适当性评估: ${p.suitability} - ${p.suitabilityMsg}
        </div>
      `
      if (p.suitability === 'BLOCK') {
        document.getElementById('buyWarning').classList.remove('hidden')
        document.getElementById('buyWarning').textContent = '🚫 您的风险等级不足以购买此产品'
      } else if (p.suitability === 'WARN') {
        document.getElementById('buyWarning').classList.remove('hidden')
        document.getElementById('buyWarning').textContent = '⚠️ 产品风险高于您的等级, 需确认'
      } else {
        document.getElementById('buyWarning').classList.add('hidden')
      }
      document.getElementById('buyAmount').value = p.minAmount || 100
      document.getElementById('buyAmount').min = p.minAmount || 0.01
      document.getElementById('buyModal').style.display = 'flex'
    }

    function closeBuyModal() {
      document.getElementById('buyModal').style.display = 'none'
      currentBuyProduct = null
    }

    async function submitBuy() {
      const amount = Number(document.getElementById('buyAmount').value)
      if (!amount || amount <= 0) return alert('金额错误')
      if (!currentBuyProduct) return

      const resp = await fetch(TRADE + '/api/v1/trade/buy', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-User-Id': userId },
        body: JSON.stringify({
          productId: currentBuyProduct.productId,
          amount,
          conversationId: currentConvId
        })
      })
      const api = await resp.json()
      if (api.data) {
        // 把订单作为聊天消息推送
        sendFrame('/app/chat/' + currentConvId, {
          conversationId: currentConvId,
          type: 'ORDER',
          content: `[订单] ${api.data.productName} ¥${amount} - ${api.data.status}`,
          orderPayload: api.data,
          orderId: api.data.orderId
        })
        closeBuyModal()
        alert(`下单成功!\n订单号: ${api.data.orderId}\n状态: ${api.data.status}\n下一步: ${api.data.nextStep}`)
      } else {
        alert('下单失败: ' + api.message)
      }
    }

    async function showOrderDetail(orderId) {
      const resp = await fetch(TRADE + '/api/v1/trade/orders/' + orderId, {
        headers: { 'X-User-Id': userId }
      })
      const api = await resp.json()
      if (!api.data) return
      const o = api.data
      const body = document.getElementById('orderModalBody')
      body.innerHTML = `
        <div class="order-card" style="margin:0;border:none">
          <div class="product-name">${escapeHtml(o.productName)}</div>
          <span class="order-status ${o.status}">${o.status}</span>
          <div class="order-amount">¥${o.amount}</div>
          <div class="product-meta" style="font-size:13px;line-height:1.8">
            订单号: ${o.orderId}<br>
            风险等级: ${o.riskLevel || '未测'}<br>
            适当性: ${o.suitability || '待评估'}<br>
            ${o.coolOffUntil ? '冷静期截止: ' + new Date(o.coolOffUntil).toLocaleString() + '<br>' : ''}
            ${o.dualRecordUrl ? '双录地址: <a href="' + o.dualRecordUrl + '">查看</a><br>' : ''}
            ${o.rejectReason ? '拒绝原因: ' + o.rejectReason + '<br>' : ''}
          </div>
          <div class="order-next">${o.nextStep}</div>
          ${o.status === 'PENDING_CONFIRM' ? `
            <div class="form-group" style="margin-top:12px">
              <label>短信验证码 (沙箱: 任意 6 位)</label>
              <input id="smsCode" placeholder="6 位数字" />
            </div>
            <div class="order-action">
              <button onclick="cancelOrder('${o.orderId}')">取消订单</button>
              <button class="primary" onclick="confirmOrder('${o.orderId}')">确认下单</button>
            </div>
          ` : ''}
          ${o.status === 'COOLING_OFF' || o.status === 'PENDING_CONFIRM' || o.status === 'PENDING_DUAL_RECORD' ? `
            <div class="order-action">
              <button onclick="cancelOrder('${o.orderId}')" style="flex:1;color:#c62828;border-color:#c62828">取消订单</button>
            </div>
          ` : ''}
        </div>
      `
      document.getElementById('orderModal').style.display = 'flex'
    }

    function closeOrderModal() {
      document.getElementById('orderModal').style.display = 'none'
    }

    async function confirmOrder(orderId) {
      const smsCode = document.getElementById('smsCode').value
      if (!smsCode) return alert('请输入验证码')
      const resp = await fetch(TRADE + '/api/v1/trade/orders/' + orderId + '/confirm', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-User-Id': userId },
        body: JSON.stringify({ smsCode })
      })
      const api = await resp.json()
      if (api.data) {
        alert('确认成功! 进入冷静期')
        closeOrderModal()
      } else {
        alert('确认失败: ' + api.message)
      }
    }

    async function cancelOrder(orderId) {
      if (!confirm('确认取消订单?')) return
      await fetch(TRADE + '/api/v1/trade/orders/' + orderId + '/cancel', {
        method: 'POST', headers: { 'X-User-Id': userId }
      })
      closeOrderModal()
    }

    // 客服推产品给客户
    async function pushProduct() {
      const products = await fetch(TRADE + '/api/v1/trade/products', { headers: { 'X-User-Id': userId }})
        .then(r => r.json()).then(a => a.data || [])
      if (products.length === 0) return alert('无产品')
      const choice = prompt(`选择产品 (1-${products.length}):\n` + products.map((p, i) => `${i+1}. ${p.productName} 收益${p.expectedYield}%`).join('\n'), '1')
      const idx = Number(choice) - 1
      if (idx < 0 || idx >= products.length) return
      const p = products[idx]
      // 适当性评估
      const rec = await fetch(TRADE + '/api/v1/trade/products/recommend', { headers: { 'X-User-Id': userId }})
      const recData = await rec.json()
      const ann = (recData.data?.products || []).find(x => x.product.productId === p.productId)
      const s = ann?.suitability || 'PASS'
      const sMsg = ann?.suitabilityMsg || ''

      sendFrame('/app/chat/' + currentConvId, {
        conversationId: currentConvId,
        type: 'PRODUCT_CARD',
        content: `[产品推荐] ${p.productName}`,
        productPayload: { ...p, suitability: s, suitabilityMsg: sMsg }
      })
      alert('产品已推送')
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))
    }

    // 暴露给全局 (内联 onclick 用)
    window.openBuyModal = openBuyModal
    window.showOrderDetail = showOrderDetail
    window.confirmOrder = confirmOrder
    window.cancelOrder = cancelOrder
    window.agentNewConv = agentNewConv
    window.openConv = openConv
    window.backToList = backToList
    window.doLogin = doLogin
    window.sendMsg = sendMsg
    window.closeBuyModal = closeBuyModal
    window.submitBuy = submitBuy
    window.closeOrderModal = closeOrderModal
    window.pushProduct = pushProduct
  </script>
</body>
</html>
